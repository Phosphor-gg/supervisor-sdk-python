name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install package
        run: |
          uv venv --python 3.14
          uv pip install -e . pytest

      - name: Run tests
        run: uv run pytest -q
